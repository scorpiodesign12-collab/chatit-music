<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ChatitMusic</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#111;color:#e8e8e8;user-select:none}
:root{--sb:#171717;--card:#1e1e1e;--border:#282828;--sub:#777;--muted:#444;--green:#1db954;--hover:#252525;--accent:#1db954}

.app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* Sidebar */
.sidebar{width:230px;min-width:230px;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.logo{font-size:20px;font-weight:800;letter-spacing:-1px;color:#fff}
.logo span{font-style:italic;font-weight:400;color:var(--green)}
.sb-nav{padding:12px 10px 6px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;font-size:13px;color:var(--sub);cursor:pointer;transition:background .15s,color .15s;margin-bottom:2px}
.ni:hover,.ni.a{background:var(--card);color:#e8e8e8}
.ni.a{color:var(--green)}
.sb-sec{padding:14px 18px 8px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.sb-list{flex:1;overflow-y:auto;padding:0 10px 12px}
.sb-list::-webkit-scrollbar{width:3px}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.tr{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:9px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.tr:hover{background:var(--hover)}
.tr.a{background:var(--card)}
.tr-th{width:38px;height:38px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--border)}
.tr-i{flex:1;min-width:0}
.tr-n{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.tr.a .tr-n{color:var(--green)}
.tr-ar{font-size:11px;color:var(--sub)}
.meq{display:none;align-items:flex-end;gap:1.5px;height:13px;flex-shrink:0}
.tr.a .meq{display:flex}
.mb{width:2.5px;border-radius:3px;background:var(--green);height:3px}
.mb.an{animation:eq var(--d,.5s) ease-in-out infinite alternate;animation-delay:var(--dl,0s)}
@keyframes eq{0%{height:3px}100%{height:var(--mh,12px)}}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mh{height:64px;min-height:64px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 24px}

/* Search bar — Spotify style */
.search-wrap{flex:1;position:relative;max-width:480px}
.search-wrap svg.s-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:#888;pointer-events:none;transition:fill .15s}
.search-wrap:focus-within svg.s-ico{fill:#fff}
#searchInput{width:100%;background:#2a2a2a;border:2px solid transparent;border-radius:30px;padding:11px 14px 11px 44px;font-size:14px;color:#fff;outline:none;transition:background .2s,border-color .2s;font-weight:500}
#searchInput::placeholder{color:#888;font-weight:400}
#searchInput:focus{background:#333;border-color:var(--green)}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;cursor:pointer;font-size:18px;display:none;line-height:1;transition:color .15s}
.search-clear:hover{color:#fff}
.genre-wrap{display:flex;gap:6px;overflow-x:auto;padding:0 2px}
.genre-wrap::-webkit-scrollbar{display:none}
.genre-btn{padding:5px 12px;border-radius:20px;font-size:12px;background:var(--card);border:1px solid var(--border);color:var(--sub);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.genre-btn:hover{color:#e8e8e8;border-color:#555}
.genre-btn.a{background:var(--green);color:#000;border-color:var(--green);font-weight:600}

.content{flex:1;overflow-y:auto;position:relative}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Top Tracks Banner */
.top-banner{padding:20px 24px 8px}
.top-banner-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.top-banner-title svg{width:22px;height:22px;fill:var(--green)}
.top-tracks-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.top-tracks-row::-webkit-scrollbar{height:3px}
.top-tracks-row::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.top-card{min-width:160px;max-width:160px;background:var(--card);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .15s,background .15s;flex-shrink:0;position:relative}
.top-card:hover{transform:translateY(-3px);background:var(--hover)}
.top-card-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--border)}
.top-card-info{padding:8px 10px 10px}
.top-card-name{font-size:12px;font-weight:600;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.top-card-artist{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-card-plays{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px;margin-top:4px}
.top-card-plays svg{width:11px;height:11px;fill:var(--green)}
.top-card-badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.75);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;letter-spacing:.5px}

/* State msgs */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--muted);font-size:13px}
.state-msg svg{width:36px;height:36px;fill:var(--muted);opacity:.5}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Track list */
.lv{padding:12px 24px 20px}
.lv-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:12px;padding-top:4px}
.lh{display:grid;grid-template-columns:36px 1fr 140px 36px 60px;gap:10px;align-items:center;padding:0 10px 10px;border-bottom:1px solid var(--border);margin-bottom:6px;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.6px;text-transform:uppercase}
.li{display:grid;grid-template-columns:36px 1fr 140px 36px 60px;gap:10px;align-items:center;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.li:hover{background:var(--hover)}
.li.a{background:var(--card)}
.li-num{font-size:13px;color:var(--muted);text-align:center;position:relative}
.li.a .li-num-t{display:none}
.li.a .lpi{display:flex}
.lpi{display:none;align-items:flex-end;gap:1.5px;height:14px;justify-content:center}
.lpb{width:2px;border-radius:3px;background:var(--green);height:3px}
.lpb.an{animation:eq var(--d,.5s) ease-in-out infinite alternate;animation-delay:var(--dl,0s)}
.li-inf{display:flex;align-items:center;gap:11px;min-width:0}
.li-cv{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--border)}
.li-mt{min-width:0}
.li-n{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;color:#e8e8e8}
.li.a .li-n{color:var(--green)}
.li-ar{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.explicit-badge{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:#777;color:#111;font-size:8px;font-weight:900;flex-shrink:0;letter-spacing:0}
.li-al{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:transform .15s;opacity:.35}
.fav-btn:hover{opacity:1;transform:scale(1.15)}
.fav-btn.on{opacity:1}
.li-acts{display:flex;align-items:center;gap:2px}
.dl-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:50%;opacity:.35;transition:opacity .15s}
.dl-btn:hover{opacity:1}
.dl-btn svg{width:15px;height:15px;fill:var(--sub)}
.li-du{font-size:12px;color:var(--muted);text-align:right}

/* Album cards */
.alb-card{background:var(--card);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,background .15s;border:1px solid var(--border)}
.alb-card:hover{transform:translateY(-3px);background:var(--hover)}
.alb-cover{width:100%;aspect-ratio:1;object-fit:cover;background:var(--border);display:block}
.alb-info{padding:10px 12px 12px}
.alb-name{font-size:13px;font-weight:600;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.alb-artist{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── FULLSCREEN PLAYER — Spotify Style ── */
.fp{position:fixed;inset:0;z-index:200;display:flex;align-items:stretch;justify-content:stretch;overflow:hidden}
.fp-bg{position:absolute;inset:0;opacity:0;transition:opacity .4s ease}
.fp.open .fp-bg{opacity:1}
.fp-inner{position:relative;display:flex;width:100%;height:100%;transform:translateY(100vh);transition:transform .45s cubic-bezier(.22,1,.36,1);flex-direction:column}
.fp.open .fp-inner{transform:translateY(0)}
.fp.closing .fp-inner{transform:translateY(100vh)}
.fp.closing .fp-bg{opacity:0}

/* Cover fills whole screen */
.fp-cover-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(80px) brightness(.4);transform:scale(1.1);pointer-events:none}
.fp-cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);pointer-events:none}

/* Back button */
.fp-back{position:absolute;top:18px;left:18px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;transition:background .15s}
.fp-back:hover{background:rgba(0,0,0,.7)}
.fp-back svg{width:20px;height:20px;fill:currentColor}

/* Content layout */
.fp-content{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;padding:70px 32px 32px;justify-content:flex-end;max-width:560px;margin:0 auto;width:100%}
.fp-album-art{width:min(300px,65vw);height:min(300px,65vw);border-radius:16px;object-fit:cover;box-shadow:0 20px 60px rgba(0,0,0,.6);margin:0 auto 28px;display:block;flex-shrink:0}

/* Desktop: side-by-side */
@media(min-width:700px){
  .fp-inner{flex-direction:row}
  .fp-content{flex-direction:row;align-items:center;justify-content:center;max-width:1000px;padding:70px 48px 48px;gap:48px}
  .fp-left-side{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
  .fp-album-art{margin:0 0 0 0}
  .fp-right-side{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
}
@media(max-width:699px){
  .fp-content{padding:60px 24px 28px;overflow-y:auto}
  .fp-left-side,.fp-right-side{width:100%}
  .fp-left-side{display:flex;flex-direction:column;align-items:center}
  .fp-album-art{width:min(260px,75vw);height:min(260px,75vw)}
}

.fp-track-info{margin-bottom:20px}
.fp-name{font-size:28px;font-weight:800;letter-spacing:-.5px;color:#fff;margin-bottom:4px;line-height:1.2}
.fp-artist{font-size:15px;color:rgba(255,255,255,.7);margin-bottom:8px}
.fp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.fp-tag{font-size:10px;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15)}
.fp-explicit{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:3px;background:rgba(255,255,255,.5);color:#000;font-size:9px;font-weight:900;margin-right:4px;vertical-align:middle}
.fp-dl{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;cursor:pointer;transition:background .15s;font-weight:600}
.fp-dl:hover{background:rgba(255,255,255,.22)}
.fp-dl svg{width:13px;height:13px;fill:currentColor}

/* Progress */
.pgw{margin-bottom:18px}
.pgt{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:99px;position:relative;cursor:pointer;margin-bottom:8px}
.pgt:hover .pgf{background:#fff}
.pgf{height:100%;background:rgba(255,255,255,.8);border-radius:99px;width:0%;transition:width .2s linear;position:relative}
.pgf::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%) scale(0);width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .2s}
.pgt:hover .pgf::after{transform:translateY(-50%) scale(1)}
.t2{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.5)}

/* Controls */
.cr{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
.cb{width:44px;height:44px;border-radius:50%;border:none;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s,transform .15s,background .15s}
.cb:hover{color:#fff;background:rgba(255,255,255,.1)}
.cb:active{transform:scale(.9)}
.cb svg{width:20px;height:20px;fill:currentColor}
.cpb{width:58px;height:58px;border-radius:50%;border:none;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.cpb:hover{background:#ddd;transform:scale(1.05)}
.cpb:active{transform:scale(.93)}
.cpb svg{width:24px;height:24px;fill:#000}

/* Volume */
.vr{display:flex;align-items:center;gap:10px}
.vr svg{width:15px;height:15px;fill:rgba(255,255,255,.4);flex-shrink:0}
.vs{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:99px;outline:none;cursor:pointer;background:rgba(255,255,255,.2)}
.vs::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.vp{font-size:11px;color:rgba(255,255,255,.4);width:28px;text-align:right}

/* Queue */
.queue{margin-top:16px;border-top:1px solid rgba(255,255,255,.1);padding-top:12px}
.queue-t{font-size:10px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:700}
.qi{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.qi:hover{background:rgba(255,255,255,.08)}
.qi.a{background:rgba(255,255,255,.1)}
.qi-th{width:34px;height:34px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.1)}
.qi-m{flex:1;min-width:0}
.qi-n{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,.8)}
.qi.a .qi-n{color:var(--green)}
.qi-ar{font-size:11px;color:rgba(255,255,255,.4)}
.qi-d{font-size:11px;color:rgba(255,255,255,.3)}

/* Wave */
.fp-wave{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:24px;margin-bottom:12px;opacity:0;transition:opacity .4s}
.fp-wave.on{opacity:1}
.wb{width:3px;border-radius:4px;background:rgba(255,255,255,.7);height:3px}
.wb.an{animation:eq var(--d,.5s) ease-in-out infinite alternate;animation-delay:var(--dl,0s)}

/* ── MOBILE BOTTOM BAR ── */
.mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--sb);border-top:1px solid var(--border);z-index:150;align-items:center;justify-content:space-around}
.mob-bar-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--sub);cursor:pointer;font-size:10px;padding:8px 12px;border-radius:8px;transition:color .15s}
.mob-bar-btn.a{color:var(--green)}
.mob-bar-btn svg{width:20px;height:20px;fill:currentColor}
.mini-player{display:none;position:fixed;bottom:64px;left:0;right:0;background:#1a1a1a;border-top:1px solid var(--border);z-index:140;padding:10px 16px;align-items:center;gap:12px;cursor:pointer}
.mini-cover{width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--border)}
.mini-info{flex:1;min-width:0}
.mini-name{font-size:13px;font-weight:500;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-artist{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-play{width:36px;height:36px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mini-play svg{width:16px;height:16px;fill:#000}
.mini-prog{position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}
.mini-prog-fill{height:100%;background:var(--green);width:0%;transition:width .2s linear}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .sidebar{display:none}
  .main{width:100%}
  .content{padding-bottom:140px}
  .mh{padding:0 12px;height:60px;min-height:60px}
  .search-wrap{max-width:100%}
  .genre-wrap{display:none}
  .lh{display:none}
  .lv{padding:10px 12px}
  .top-banner{padding:14px 12px 4px}
  .li{grid-template-columns:1fr 36px 50px;gap:8px;padding:8px 8px}
  .li-num,.li-al{display:none}
  .li-cv{width:44px;height:44px}
  .mob-bar{display:flex}
  .mini-player{display:flex}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head"><div class="logo">Chat<span>it</span> Music</div></div>
    <nav class="sb-nav">
      <div class="ni a" id="navAll">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Главная
      </div>
      <div class="ni" id="navFav">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        Избранное
      </div>
      <div class="ni" id="navAlbums">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
        Альбомы
      </div>
    </nav>
    <div class="sb-sec">Сейчас играет</div>
    <div class="sb-list" id="sbList"></div>
  </aside>

  <main class="main">
    <header class="mh">
      <div class="search-wrap">
        <svg class="s-ico" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="searchInput" placeholder="Что хочешь включить?" autocomplete="off">
        <button class="search-clear" id="searchClear">✕</button>
      </div>
      <div class="genre-wrap" id="genreWrap"></div>
    </header>
    <div class="content" id="content">
      <div id="viewTracks">
        <!-- Top Tracks Section -->
        <div class="top-banner" id="topBanner"></div>
        <div class="lv">
          <div class="lh">
            <div>#</div><div>Название</div><div>Альбом</div><div></div><div style="text-align:right">⏱</div>
          </div>
          <div id="mainList"></div>
        </div>
      </div>
      <div id="viewAlbums" style="display:none;padding:16px 20px">
        <div id="albumsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px"></div>
      </div>
    </div>
  </main>

function getPlayStats(){
  try{ return JSON.parse(localStorage.getItem('chatit_playstats')||'{}'); }catch(e){ return {}; }
}
function savePlayStats(stats){
  localStorage.setItem('chatit_playstats', JSON.stringify(stats));
}
function incrementPlay(trackId){
  const stats = getPlayStats();
  stats[trackId] = (stats[trackId]||0) + 1;
  savePlayStats(stats);
}

function fmt(s){if(!s||isNaN(s))return'—';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

async function downloadTrack(url, name){
  try{
    const dlName = '(Chatit-Music) ' + (name||'track').replace(/[\\/:*?"<>|]/g,'_') + '.mp3';
    const r = await fetch(url);
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = dlName;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 1000);
  }catch(e){ console.error('Download failed', e); }
}

// ── API ──
async function fetchTracks(query='', genre='', page=1){
  if(!CLIENT_ID) return [];
  const limit = 20, offset = (page-1)*limit;
  const params = new URLSearchParams({
    client_id: CLIENT_ID, format: 'json', limit, offset,
    include: 'musicinfo', imagesize: 200, audioformat: 'mp31',
    order: query||genre ? 'relevance' : 'popularity_total',
  });
  if(query) params.set('search', query);
  if(genre) params.set('tags', genre);
  try{
    const r = await fetch(`${BASE}/tracks/?${params}`);
    const d = await r.json();
    if(d.headers?.status !== 'success') return [];
    return (d.results||[]).map(t=>({
      id: t.id, name: t.name, artist: t.artist_name,
      album: t.album_name || '—', cover: t.image || '',
      src: t.audio, download: t.audiodownload || t.audio,
      duration: t.duration, explicit: false,
      tags: (t.musicinfo?.tags?.genres||[]).concat(t.musicinfo?.tags?.instruments||[]).slice(0,4),
    }));
  }catch(e){ return []; }
}

async function fetchAlbums(query='', page=1){
  if(!CLIENT_ID) return [];
  const limit = 24, offset = (page-1)*limit;
  const params = new URLSearchParams({
    client_id: CLIENT_ID, format: 'json', limit, offset,
    imagesize: 300, order: query ? 'relevance' : 'popularity_total',
  });
  if(query) params.set('namesearch', query);
  try{
    const r = await fetch(`${BASE}/albums/?${params}`);
    const d = await r.json();
    if(d.headers?.status !== 'success') return [];
    return (d.results||[]).map(a=>({ id: a.id, name: a.name, artist: a.artist_name, cover: a.image||'' }));
  }catch(e){ return []; }
}

// ── TOP TRACKS BANNER ──
function renderTopBanner(){
  const banner = document.getElementById('topBanner');
  if(currentQuery || currentGenre || currentView !== 'tracks'){
    banner.innerHTML = '';
    return;
  }
  const stats = getPlayStats();
  // Combine MY_TRACKS with play counts
  const ranked = MY_TRACKS
    .map(t => ({ ...t, plays: stats[t.id]||0 }))
    .filter(t => t.plays > 0)
    .sort((a,b) => b.plays - a.plays)
    .slice(0, 8);

  if(!ranked.length){
    banner.innerHTML = `
      <div class="top-banner-title">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        Чаще всего слушают
      </div>
      <div style="font-size:12px;color:var(--muted);padding-bottom:12px">Включи треки — здесь появится статистика 🎧</div>`;
    return;
  }

  const cards = ranked.map(t => {
    const idx = TRACKS.findIndex(tr=>tr.id===t.id);
    return `<div class="top-card" data-idx="${idx}" data-id="${t.id}">
      <img class="top-card-img" src="${t.cover}" alt="${t.name}" loading="lazy">
      <div class="top-card-info">
        <div class="top-card-name">${t.name}</div>
        <div class="top-card-artist">${t.artist}</div>
        <div class="top-card-plays">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
          ${t.plays} прослушиваний
        </div>
      </div>
    </div>`;
  }).join('');

  banner.innerHTML = `
    <div class="top-banner-title">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      Чаще всего слушают
    </div>
    <div class="top-tracks-row">${cards}</div>`;

  banner.querySelectorAll('.top-card').forEach(card=>{
    card.addEventListener('click', ()=>{
      const idx = parseInt(card.dataset.idx);
      if(idx >= 0) openPlayer(idx);
    });
  });
}

// ── RENDER ──
function rndBars(cls,n,mhRange=[5,14]){
  return Array.from({length:n},()=>{
    const d=(0.3+Math.random()*.45).toFixed(2),dl=(Math.random()*.35).toFixed(2),mh=(mhRange[0]+Math.random()*(mhRange[1]-mhRange[0])).toFixed(1);
    return `<div class="${cls}" style="--d:${d}s;--dl:${dl}s;--mh:${mh}px"></div>`;
  }).join('');
}

  const list = currentView==='fav' ? TRACKS.filter((_,i)=>favs.has(i)) : TRACKS;
  if(!list.length){
    ml.innerHTML = `<div class="state-msg"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>${currentView==='fav'?'Нет избранных треков':'Ничего не найдено'}</div>`;
    return;
  }
  list.forEach((t,row)=>{
    const globalIdx = currentView === 'fav' ? TRACKS.indexOf(t) : row;
    const explicitBadge = t.explicit ? `<span class="explicit-badge">М</span>` : '';
    const li = document.createElement('div');
    li.className = 'li'; li.dataset.idx = globalIdx;
    li.innerHTML = `
      <div class="li-num">
        <span class="li-num-t">${row+1}</span>
        <div class="lpi">${rndBars('lpb',3,[4,12])}</div>
      </div>
      <div class="li-inf">
        <img class="li-cv" src="${t.cover}" alt="${t.name}" loading="lazy">
        <div class="li-mt">
          <div class="li-n">${t.name}</div>
          <div class="li-ar">${explicitBadge}${t.artist}</div>
        </div>
      </div>
      <div class="li-al">${t.album}</div>
      <div class="li-acts">
        <button class="fav-btn" data-idx="${globalIdx}" title="Избранное">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        ${t.download?`<button class="dl-btn" data-url="${t.download}" data-name="${t.name}" title="Скачать"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></button>`:''}
      </div>
      <div class="li-du">${fmt(t.duration)}</div>`;
    li.addEventListener('click', e=>{
      if(e.target.closest('.fav-btn')||e.target.closest('.dl-btn')) return;
      openPlayer(globalIdx);
    });
    li.querySelector('.fav-btn').addEventListener('click', e=>{
      e.stopPropagation();
      const idx = parseInt(e.currentTarget.dataset.idx);
      if(favs.has(idx)) favs.delete(idx); else favs.add(idx);
      localStorage.setItem('jamendo_favs', JSON.stringify([...favs]));
      updUI();
    });
    const dlBtn = li.querySelector('.dl-btn');
    if(dlBtn) dlBtn.addEventListener('click', e=>{
      e.stopPropagation();
      downloadTrack(e.currentTarget.dataset.url, e.currentTarget.dataset.name);
    });
    ml.appendChild(li);
  });
}

function renderSidebar(){
  const sl = document.getElementById('sbList');
  sl.innerHTML = '';
  if(cur < 0 || !TRACKS.length){ sl.innerHTML='<div style="padding:8px 10px;font-size:12px;color:var(--muted)">Ничего не играет</div>'; return; }
  const start = Math.max(0, cur - 2);
  const end = Math.min(TRACKS.length, cur + 8);
  TRACKS.slice(start, end).forEach(t=>{
    const i = TRACKS.indexOf(t);
    const sr = document.createElement('div');
    sr.className = 'tr' + (i===cur?' a':''); sr.dataset.idx = i;
    sr.innerHTML = `
      <img class="tr-th" src="${t.cover}" alt="${t.name}" loading="lazy">
      <div class="tr-i">
        <div class="tr-n">${t.name}</div>
        <div class="tr-ar">${t.artist}</div>
      </div>
      <div class="meq">${rndBars('mb',3,[4,10])}</div>`;
    sr.addEventListener('click', ()=>openPlayer(i));
    sl.appendChild(sr);
  });
  document.querySelectorAll('.tr').forEach(el=>{
    const i = parseInt(el.dataset.idx);
    el.querySelectorAll('.mb').forEach(b=>b.classList.toggle('an', i===cur&&playing));
  });
}

function renderQueue(){
  const ql = document.getElementById('qList');
  ql.innerHTML = '';
  TRACKS.slice(cur+1, cur+6).forEach((t,j)=>{
    const i = cur+1+j;
    const qi = document.createElement('div');
    qi.className = 'qi'; qi.dataset.idx = i;
    qi.innerHTML = `
      <img class="qi-th" src="${t.cover}" alt="${t.name}" loading="lazy">
      <div class="qi-m">
        <div class="qi-n">${t.name}</div>
        <div class="qi-ar">${t.artist}</div>
      </div>
      <span class="qi-d">${fmt(t.duration)}</span>`;
    qi.addEventListener('click', ()=>load(i,true));
    ql.appendChild(qi);
  });
}

function renderAlbums(append=false){
  const grid = document.getElementById('albumsGrid');
  if(!append) grid.innerHTML = '';
  if(!albumsData.length && !append){
    grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>Нет альбомов</div>`;
    return;
  }
  albumsData.forEach(a=>{
    const card = document.createElement('div');
    card.className = 'alb-card';
    card.innerHTML = `<img class="alb-cover" src="${a.cover}" alt="${a.name}" loading="lazy"><div class="alb-info"><div class="alb-name">${a.name}</div><div class="alb-artist">${a.artist}</div></div>`;
    card.addEventListener('click', ()=>{
      currentView='tracks'; currentQuery=a.artist; currentPage=1; TRACKS=[];
      document.getElementById('searchInput').value=a.artist;
      document.getElementById('searchClear').style.display='block';
      showView('tracks');
      doSearch();
    });
    grid.appendChild(card);
  });
}

async function doAlbums(append=false){
  const grid = document.getElementById('albumsGrid');
  if(!append){
    grid.innerHTML=`<div class="state-msg" style="grid-column:1/-1"><div class="spinner"></div>Загружаем альбомы...</div>`;
  }
  const results = await fetchAlbums(currentQuery, albumsPage);
  if(append) albumsData=[...albumsData,...results];
  else albumsData=[...MY_ALBUMS, ...results];
  renderAlbums(append);
  // No "load more" button — auto infinite scroll
  if(results.length===24){
    albumsPage++;
    doAlbums(true);
  }
}

function updUI(){
  document.querySelectorAll('.li').forEach(el=>{
    const i = parseInt(el.dataset.idx);
    el.classList.toggle('a', i===cur);
    el.querySelectorAll('.lpb').forEach(b=>b.classList.toggle('an', i===cur&&playing));
    const fb = el.querySelector('.fav-btn');
    if(fb){
      const isFav = favs.has(i);
      fb.classList.toggle('on', isFav);
      const sv = fb.querySelector('svg');
      sv.style.fill = isFav ? '#1db954' : 'none';
      sv.style.stroke = isFav ? '#1db954' : '#777';
    }
  });
  document.querySelectorAll('.tr').forEach(el=>{
    const i = parseInt(el.dataset.idx);
    el.classList.toggle('a', i===cur);
    el.querySelectorAll('.mb').forEach(b=>b.classList.toggle('an', i===cur&&playing));
  });
  document.querySelectorAll('.qi').forEach(el=>{
    el.classList.toggle('a', parseInt(el.dataset.idx)===cur);
  });
  updMiniPlayer();
}

// ── PLAYER ──
const fpWave = document.getElementById('fpWave');
for(let i=0;i<20;i++){const b=document.createElement('div');b.className='wb';const mh=8+Math.random()*20,d=(0.3+Math.random()*0.5).toFixed(2),dl=(Math.random()*0.38).toFixed(2);b.style.cssText=`--d:${d}s;--dl:${dl}s;--mh:${mh}px`;fpWave.appendChild(b)}

function setPlaying(s){
  playing = s;
  document.getElementById('iPlay').style.display = s?'none':'block';
  document.getElementById('iPause').style.display = s?'block':'none';
  fpWave.classList.toggle('on', s);
  fpWave.querySelectorAll('.wb').forEach(b=>b.classList.toggle('an', s));
  updUI();
}

function load(i, play=false){
  if(i<0||i>=TRACKS.length) return;
  cur = i;
  const t = TRACKS[i];
  au.src = t.src;
  au.volume = document.getElementById('vs').value/100;

  // Cover + dynamic background
  document.getElementById('fpCover').src = t.cover;
  document.getElementById('fpCoverBg').style.backgroundImage = `url('${t.cover}')`;
  document.getElementById('fpBg').style.background = 'rgba(0,0,0,.7)';

  document.getElementById('fpName').textContent = t.name;
  document.getElementById('fpArtist').textContent = (t.explicit ? '🅼 ' : '') + t.artist;
  document.getElementById('pgf').style.width = '0%';
  document.getElementById('tc').textContent = '0:00';
  document.getElementById('tt').textContent = fmt(t.duration);
  const tagsEl = document.getElementById('fpTags');
  tagsEl.innerHTML = (t.tags||[]).map(tag=>`<span class="fp-tag">${tag}</span>`).join('');
  const dlEl = document.getElementById('fpDl');
  if(t.download){
    dlEl.style.display='inline-flex';
    dlEl.onclick = () => downloadTrack(t.download, t.name);
  } else dlEl.style.display='none';
  if(play){
    au.play();
    setPlaying(true);
    // Track stats: count every play
    if(t.id) incrementPlay(t.id);
    renderTopBanner();
  } else setPlaying(false);
  renderSidebar();
  renderQueue();
  updUI();
}

function openPlayer(i){
  if(i !== cur) load(i, true);
  else if(!playing){
    au.play();
    setPlaying(true);
    if(TRACKS[cur]?.id){ incrementPlay(TRACKS[cur].id); renderTopBanner(); }
  }
  const fp = document.getElementById('fp');
  fp.style.pointerEvents = 'all';
  fp.classList.remove('closing');
  fp.classList.add('open');
}

function closePlayer(){
  const fp = document.getElementById('fp');
  fp.classList.add('closing');
  fp.classList.remove('open');
  setTimeout(()=>{ fp.classList.remove('closing'); fp.style.pointerEvents='none'; }, 480);
}

document.getElementById('btnPlay').addEventListener('click',()=>{
  if(cur<0&&TRACKS.length){load(0,true);return}
  if(playing){au.pause();setPlaying(false);}else{
    au.play();setPlaying(true);
    if(TRACKS[cur]?.id){ incrementPlay(TRACKS[cur].id); renderTopBanner(); }
  }
});
document.getElementById('btnPrev').addEventListener('click',()=>{
  if(au.currentTime>3){au.currentTime=0;return}
  load((cur-1+TRACKS.length)%TRACKS.length, playing);
});
document.getElementById('btnNext').addEventListener('click',()=>load((cur+1)%TRACKS.length, playing));
au.addEventListener('ended',()=>load((cur+1)%TRACKS.length, true));
au.addEventListener('error',()=>{
  if(cur<0) return;
  const errBanner = document.getElementById('errBanner');
  if(errBanner){ errBanner.textContent = '⚠️ Трек «'+TRACKS[cur].name+'» недоступен — пропускаем...'; errBanner.style.display='block'; setTimeout(()=>errBanner.style.display='none',3000); }
  setTimeout(()=>{ if(playing) load((cur+1)%TRACKS.length, true); }, 800);
});
au.addEventListener('timeupdate',()=>{
  if(!au.duration)return;
  const p=(au.currentTime/au.duration)*100;
  document.getElementById('pgf').style.width=p+'%';
  document.getElementById('miniProgFill').style.width=p+'%';
  document.getElementById('tc').textContent=fmt(au.currentTime);
});
document.getElementById('pgt').addEventListener('click',e=>{
  const r=document.getElementById('pgt').getBoundingClientRect();
  if(au.duration) au.currentTime=((e.clientX-r.left)/r.width)*au.duration;
});
document.getElementById('vs').addEventListener('input',e=>{
  au.volume=e.target.value/100;
  document.getElementById('vp').textContent=e.target.value;
});
document.getElementById('fpClose').addEventListener('click',closePlayer);
document.getElementById('fpBg').addEventListener('click', e=>{ if(e.target===document.getElementById('fpBg')) closePlayer(); });

// ── MINI PLAYER ──
function updMiniPlayer(){
  if(cur<0||!TRACKS[cur])return;
  const t=TRACKS[cur];
  document.getElementById('miniCover').src=t.cover;
  document.getElementById('miniName').textContent=t.name;
  document.getElementById('miniArtist').textContent=t.artist;
  document.getElementById('miniIPlay').style.display=playing?'none':'block';
  document.getElementById('miniIPause').style.display=playing?'block':'none';
}
document.getElementById('miniPlayer').addEventListener('click',e=>{
  if(e.target.closest('#miniPlayBtn'))return;
  if(cur>=0) openPlayer(cur);
});
document.getElementById('miniPlayBtn').addEventListener('click',e=>{
  e.stopPropagation();
  if(playing){au.pause();setPlaying(false);}else{
    au.play();setPlaying(true);
    if(TRACKS[cur]?.id){ incrementPlay(TRACKS[cur].id); renderTopBanner(); }
  }
});

// ── SEARCH & GENRES ──
const GENRE_LABELS = {pop:'Pop',rock:'Rock',electronic:'Electronic',hiphop:'Hip-Hop',jazz:'Jazz',classical:'Classical',ambient:'Ambient',metal:'Metal',folk:'Folk',reggae:'Reggae',latin:'Latin',lounge:'Lounge'};
function renderGenres(){
  const gw = document.getElementById('genreWrap');
  gw.innerHTML = '';
  GENRES.forEach(g=>{
    const btn = document.createElement('button');
    btn.className = 'genre-btn' + (g===currentGenre?' a':'');
    btn.textContent = GENRE_LABELS[g]||g;
    btn.addEventListener('click',()=>{
      currentGenre = currentGenre===g ? '' : g;
      currentPage=1; TRACKS=[];
      document.getElementById('searchInput').value='';
      currentQuery='';
      renderGenres();
      showView('tracks');
      doSearch();
    });
    gw.appendChild(btn);
  });
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input',e=>{
  const v=e.target.value.trim();
  document.getElementById('searchClear').style.display=v?'block':'none';
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    currentQuery=v; currentPage=1; TRACKS=[];
    currentGenre=''; renderGenres();
    showView('tracks'); doSearch();
  },400);
});
document.getElementById('searchClear').addEventListener('click',()=>{
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').style.display='none';
  currentQuery=''; currentPage=1; TRACKS=[];
  showView('tracks');
  doSearch();
});

async function doSearch(append=false){
  const ml=document.getElementById('mainList');
  const isHome = !currentQuery && !currentGenre && currentPage===1 && !append;

  if(isHome){
    TRACKS = [...MY_TRACKS];
    renderList();
    renderTopBanner();
    renderSidebar();
    renderQueue();
    ml.insertAdjacentHTML('beforeend','<div id="jamendoLoading" class="state-msg" style="height:60px"><div class="spinner"></div></div>');
  } else if(!append){
    ml.innerHTML=`<div class="state-msg"><div class="spinner"></div>Загружаем треки...</div>`;
  }

  if(!CLIENT_ID) return;
  const results = await fetchTracks(currentQuery, currentGenre, currentPage);

  const loadingEl = document.getElementById('jamendoLoading');
  if(loadingEl) loadingEl.remove();

  if(isHome){
    TRACKS = [...MY_TRACKS, ...results];
  } else if(append){
    TRACKS=[...TRACKS,...results];
  } else {
    const q = currentQuery.toLowerCase();
    const myFiltered = q ? MY_TRACKS.filter(t=>
      t.name.toLowerCase().includes(q) ||
      t.artist.toLowerCase().includes(q) ||
      t.album.toLowerCase().includes(q)
    ) : MY_TRACKS;
    TRACKS = [...myFiltered, ...results];
  }

  if(!TRACKS.length){
    ml.innerHTML=`<div class="state-msg"><svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>${currentQuery?'По запросу «'+currentQuery+'» ничего не найдено':'Нет треков'}</div>`;
    return;
  }
  renderList();
  renderTopBanner();
  renderSidebar();
  renderQueue();

  // Infinite scroll instead of button
  if(results.length===20){
    currentPage++;
    // auto-load more when near end
    setupInfiniteScroll();
  }
}

// Infinite scroll
let scrollListening = false;
function setupInfiniteScroll(){
  if(scrollListening) return;
  scrollListening = true;
  const content = document.getElementById('content');
  const handler = () => {
    if(content.scrollTop + content.clientHeight >= content.scrollHeight - 200){
      scrollListening = false;
      content.removeEventListener('scroll', handler);
      doSearch(true);
    }
  };
  content.addEventListener('scroll', handler);
}

// ── VIEW SWITCHING ──
function showView(v){
  currentView = v;
  document.getElementById('viewTracks').style.display = (v==='albums') ? 'none' : 'block';
  document.getElementById('viewAlbums').style.display = (v==='albums') ? 'block' : 'none';
  ['navAll','navFav','navAlbums'].forEach(id=>document.getElementById(id).classList.remove('a'));
  if(v==='tracks') document.getElementById('navAll').classList.add('a');
  else if(v==='fav') document.getElementById('navFav').classList.add('a');
  else if(v==='albums') document.getElementById('navAlbums').classList.add('a');
  ['mobBtnAll','mobBtnFav','mobBtnAlbums'].forEach(id=>{ const el=document.getElementById(id); if(el) el.classList.remove('a'); });
  if(v==='tracks'){ const el=document.getElementById('mobBtnAll'); if(el) el.classList.add('a'); }
  else if(v==='fav'){ const el=document.getElementById('mobBtnFav'); if(el) el.classList.add('a'); }
  else if(v==='albums'){ const el=document.getElementById('mobBtnAlbums'); if(el) el.classList.add('a'); }
  document.getElementById('genreWrap').style.display = (v==='albums') ? 'none' : '';
  if(v==='fav') renderList();
}

function switchTab(v){
  showView(v);
  if(v==='albums'){
    albumsPage=1; albumsData=[];
    doAlbums();
  } else if(v==='tracks' && !TRACKS.length){
    doSearch();
  }
}

document.getElementById('navAll').addEventListener('click',()=>switchTab('tracks'));
document.getElementById('navFav').addEventListener('click',()=>switchTab('fav'));
document.getElementById('navAlbums').addEventListener('click',()=>switchTab('albums'));

const mba = document.getElementById('mobBtnAll');
const mbf = document.getElementById('mobBtnFav');
const mbAlb = document.getElementById('mobBtnAlbums');
if(mba) mba.addEventListener('click',()=>switchTab('tracks'));
if(mbf) mbf.addEventListener('click',()=>switchTab('fav'));
if(mbAlb) mbAlb.addEventListener('click',()=>switchTab('albums'));

// ── INIT ──
renderGenres();
doSearch();
</script>
</body>
</html>
